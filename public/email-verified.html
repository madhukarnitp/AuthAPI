<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 90%;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            color: #111827;
        }

        p {
            color: #6b7280;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">✅</div>

        <h1>Email Verified!</h1>

        <p>
            Your email has been successfully verified.
            You can now log in to your account and start using all features.
        </p>

        <a class="btn" href="/login.html">Go to Login</a>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = "/login.html";
        }, 4000);
    </script>
</body>

</html>
